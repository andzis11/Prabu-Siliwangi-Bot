# Prabu-Siliwangi Docker Compose
# Full stack: Rust Engine + Telegram Bot + Services

services:
  # Rust Copy Engine - High performance trading engine
  rust-copy-engine:
    build:
      context: ./services/rust-copy-engine
      dockerfile: Dockerfile
    container_name: prabu-rust-engine
    ports:
      - "8787:8787"
    environment:
      - NODE_ENV=production
      - RUST_LOG=info
    volumes:
      - ./services/rust-copy-engine/static:/app/static:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8787/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - prabu-network

  # Kabayan Bot - Telegram trading bot
  kabayan-bot:
    build:
      context: .
      dockerfile: apps/kabayan-bot/Dockerfile
    container_name: prabu-kabayan-bot
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - CHAT_ID=${CHAT_ID}
      - SOLANA_PRIVATE_KEY=${SOLANA_PRIVATE_KEY}
      - HELIUS_API_KEY=${HELIUS_API_KEY}
      - RUST_COPY_ENGINE_URL=http://rust-copy-engine:8787
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
    depends_on:
      rust-copy-engine:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - prabu-network

  # Optional: Prometheus for metrics collection
  prometheus:
    image: prom/prometheus:latest
    container_name: prabu-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    networks:
      - prabu-network

  # Optional: Grafana for visualization
  grafana:
    image: grafana/grafana:latest
    container_name: prabu-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - prabu-network

networks:
  prabu-network:
    driver: bridge
