# Prometheus configuration for Prabu-Siliwangi
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Rust Copy Engine metrics
  - job_name: 'prabu-rust-engine'
    static_configs:
      - targets: ['rust-copy-engine:8787']
    metrics_path: '/metrics'

  # Prabu Siliwangi (if exposed)
  - job_name: 'prabu-siliwangi'
    static_configs:
      - targets: ['prabu-siliwangi:3000']
