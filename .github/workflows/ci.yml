name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  CARGO_TERM_COLOR: always

jobs:
  # TypeScript Build & Lint
  ts-build:
    name: TypeScript Build
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npm run typecheck

      - name: ESLint
        run: npm run lint

      - name: Build
        run: npm run build

  # Rust Build
  rust-build:
    name: Rust Build
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-action@stable
        with:
          toolchain: stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ./services/rust-copy-engine

      - name: Check formatting
        working-directory: services/rust-copy-engine
        run: cargo fmt --check

      - name: Clippy lints
        working-directory: services/rust-copy-engine
        run: cargo clippy -- -D warnings

      - name: Build
        working-directory: services/rust-copy-engine
        run: cargo build --release

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: prabu-copy-engine
          path: services/rust-copy-engine/target/release/prabu-copy-engine

  # Docker Build
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [ts-build, rust-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Rust Engine Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./services/rust-copy-engine
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/prabu-rust-engine:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/prabu-rust-engine:${{ github.sha }}

      - name: Build Kabayan Bot Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/kabayan-bot/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/prabu-kabayan-bot:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/prabu-kabayan-bot:${{ github.sha }}

  # Deploy to Server
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /app/prabu-siliwangi
            git pull origin main
            docker-compose pull
            docker-compose up -d --build
            docker system prune -f

  # Discord/Slack Notification
  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [docker-build, deploy]
    if: always()
    
    steps:
      - name: Send notification
        if: needs.deploy.result == 'success'
        run: |
          echo "Deployment successful!"

      - name: Send failure notification
        if: needs.deploy.result == 'failure'
        run: |
          echo "Deployment failed!"
